spring:
    application:
        name: user-service
    
    cloud:
        compatibility-verifier:
            enabled: false

    datasource:
        url: jdbc:postgresql://localhost:5432/nexcart
        username: postgres
        password: postgres
        driver-class-name: org.postgresql.Driver

    jpa:
        open-in-view: false
        hibernate:
            ddl-auto: update

        properties:
            hibernate:
                format_sql: true

    sql:
        init:
            mode: never

server:
    port: 8080

eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka/
        register-with-eureka: true
        fetch-registry: true
    instance:
        prefer-ip-address: true
        lease-renewal-interval-in-seconds: 30

management:
    endpoints:
        web:
            exposure:
                include: health,info,prometheus,metrics
    endpoint:
        health:
            show-details: always
    metrics:
        export:
            prometheus:
                enabled: true
