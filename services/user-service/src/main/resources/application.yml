spring:
    application:
        name: user-service

    datasource:
        url: jdbc:postgresql://localhost:5432/nexcart
        username: postgres
        password: postgres
        driver-class-name: org.postgresql.Driver

    jpa:
        open-in-view: false
        hibernate:
            ddl-auto: update

        properties:
            hibernate:
                format_sql: true

    sql:
        init:
            mode: never
