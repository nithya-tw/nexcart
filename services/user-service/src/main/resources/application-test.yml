spring:
  application:
    name: user-service
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: false

logging:
  level:
    org.springframework.test: INFO
    org.hibernate: WARN
