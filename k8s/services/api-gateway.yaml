apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: nexcart
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: nexcart/api-gateway:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8765
        env:
        - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
          valueFrom:
            configMapKeyRef:
              name: nexcart-config
              key: EUREKA_URL
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: nexcart
spec:
  type: LoadBalancer
  ports:
  - port: 8765
    targetPort: 8765
  selector:
    app: api-gateway
